<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TTECFF32F0"></script>
    <script src="./gtag.js"></script>
    <title>試合ログ分析一覧 – ibis-ssl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous" />
    <link href="./styles.css" rel="stylesheet" />
    <style>
      /* ===== 試合ログ一覧ページ追加スタイル ===== */
      .match-groups {
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      .match-folder-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .match-folder-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 8px;
      }

      .match-folder-title {
        margin: 0;
        color: var(--text-primary);
        font-size: 1.05rem;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .match-folder-count {
        flex-shrink: 0;
        color: var(--text-secondary);
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.75rem;
        font-weight: 700;
      }

      .match-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 8px;
      }

      .match-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 20px;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
      }

      .match-card:hover {
        border-color: var(--accent-blue);
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        color: inherit;
        text-decoration: none;
      }

      .match-card-filename {
        font-size: 0.78rem;
        color: var(--text-secondary);
        font-family: 'SFMono-Regular', Consolas, monospace;
        word-break: break-all;
      }

      /* スコアボード: チーム名とスコアを同行に3カラムで並べる */
      .match-scoreboard {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .match-team-col {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
        min-width: 0;
      }

      .match-team-col--yellow { flex-direction: row; }
      .match-team-col--blue   { flex-direction: row-reverse; }

      .match-team-name {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.15s;
      }

      .match-team-col.winner .match-team-name {
        color: var(--text-primary);
        font-weight: 700;
      }

      .match-score-num {
        font-size: 2rem;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        flex-shrink: 0;
      }

      .match-score-yellow { color: #E5C000; }
      .match-score-blue   { color: #3B7FE0; }

      .match-score-sep {
        color: var(--text-secondary);
        font-size: 1.4rem;
        font-weight: 400;
        flex-shrink: 0;
      }

      .match-meta-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.8rem;
        color: var(--text-secondary);
      }

      .match-duration-badge {
        display: inline-block;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.75rem;
        font-family: monospace;
      }

      .match-result-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 700;
      }
      .match-result-badge.yellow-win { background: rgba(229,192,0,0.15); color: #E5C000; }
      .match-result-badge.blue-win   { background: rgba(59,127,224,0.15); color: #3B7FE0; }
      .match-result-badge.draw       { background: rgba(128,128,128,0.15); color: #888; }

      .match-download-link {
        display: inline-block;
        margin-left: 6px;
        font-size: 0.9rem;
        text-decoration: none;
        opacity: 0.6;
        vertical-align: middle;
        transition: opacity 0.2s;
      }
      .match-download-link:hover { opacity: 1; }

      .no-data-msg {
        text-align: center;
        padding: 48px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- ヘッダー -->
      <header class="page-header">
        <h1>試合ログ分析</h1>
        <p class="subtitle">Google Drive に保存された実試合ログの詳細分析</p>
        <nav class="page-nav">
          <a href="./index.html"         class="nav-link">ホーム</a>
          <a href="./build.html"         class="nav-link">ビルド時間分析</a>
          <a href="./match.html"         class="nav-link">TIGERs対戦統計</a>
          <a href="./goals.html"         class="nav-link">ゴールシーン一覧</a>
          <a href="./player.html"        class="nav-link">ログプレイヤー</a>
          <a href="./analysis-list.html" class="nav-link active">試合ログ分析</a>
        </nav>
      </header>

      <!-- サマリーカード -->
      <div class="summary-cards" id="summary-cards">
        <div class="summary-card">
          <div class="summary-card-label">総試合数</div>
          <div class="summary-card-value" id="total-matches">–</div>
          <div class="summary-card-subtitle">実試合ログ</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">平均試合時間</div>
          <div class="summary-card-value" id="avg-duration">–</div>
          <div class="summary-card-subtitle">分</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">総ゴール数</div>
          <div class="summary-card-value" id="total-goals">–</div>
          <div class="summary-card-subtitle">全チーム合計</div>
        </div>
      </div>

      <!-- 試合カード一覧 -->
      <div class="chart-card">
        <h2>試合一覧</h2>
        <p class="chart-description">各試合カードをクリックすると詳細分析ページへ移動します。</p>
        <div id="match-groups" class="match-groups"></div>
        <div id="loading-msg" style="text-align:center;padding:32px;color:var(--text-secondary)">データを読み込み中...</div>
      </div>
    </div>

    <script src="./analysis-list.js"></script>
  </body>
</html>
