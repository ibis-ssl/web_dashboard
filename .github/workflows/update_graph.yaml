name: Execute and Save Outputs

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  detect-mode:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect analysis mode
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED=$(git diff HEAD~1 --name-only -- 'scripts/' 'public/' 2>/dev/null || echo "")
            if [ -n "$CHANGED" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "ソースコード変更を検出: フルモードで実行します"
              echo "$CHANGED"
            else
              echo "mode=incremental" >> $GITHUB_OUTPUT
              echo "ソースコード変更なし: インクリメンタルモードで実行します"
            fi
          else
            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "スケジュール/手動実行: インクリメンタルモードで実行します"
          fi

  collect-build-data:
    runs-on: ubuntu-latest
    needs: detect-mode
    permissions:
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy python-dxf

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: cache
          key: cache-crane-${{ github.run_id }}
          restore-keys: |
            cache-crane-

      - name: Execute crane.py
        run: |
          mkdir -p cache
          INCREMENTAL_FLAG=""
          if [ "${{ needs.detect-mode.outputs.mode }}" = "incremental" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi
          python scripts/crane.py --github_token ${{ secrets.GH_PAT }} --github_actor ${{ github.actor }} $INCREMENTAL_FLAG
          cp github_action_data.json cache/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: crane-data
          path: github_action_data.json

  collect-match-data:
    runs-on: ubuntu-latest
    needs: detect-mode
    permissions:
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: cache
          key: cache-match-${{ github.run_id }}
          restore-keys: |
            cache-match-

      - name: Execute match_collector.py
        run: |
          mkdir -p cache
          INCREMENTAL_FLAG=""
          if [ "${{ needs.detect-mode.outputs.mode }}" = "incremental" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi
          python scripts/match_collector.py --github_token ${{ secrets.GH_PAT }} $INCREMENTAL_FLAG
          cp match_data.json cache/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: match-data
          path: match_data.json

  collect-goal-scenes:
    runs-on: ubuntu-latest
    needs: detect-mode
    permissions:
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests protobuf

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: cache
          key: cache-goal-${{ github.run_id }}
          restore-keys: |
            cache-goal-

      - name: Execute goal_scene_collector.py
        run: |
          mkdir -p cache
          # ゴールシーンデータは過去試合の不変データのため常にインクリメンタルモードで実行
          python scripts/goal_scene_collector.py --github_token ${{ secrets.GH_PAT }}
          cp goal_scenes.json cache/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: goal-data
          path: goal_scenes.json

  collect-reallog-data:
    runs-on: ubuntu-latest
    needs: detect-mode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "gdown>=5.1" protobuf

      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: cache/reallog
          key: cache-reallog-${{ github.run_id }}
          restore-keys: |
            cache-reallog-

      - name: Analyze real game logs
        run: |
          mkdir -p cache/reallog public/analysis-data public/analysis-folders
          cp -r cache/reallog/analysis-data-cache/. public/analysis-data/ 2>/dev/null || true
          cp -r cache/reallog/analysis-folders-cache/. public/analysis-folders/ 2>/dev/null || true
          cp cache/reallog/analysis-index.json public/analysis-index.json 2>/dev/null || true
          INCREMENTAL_FLAG=""
          if [ "${{ needs.detect-mode.outputs.mode }}" = "incremental" ]; then
            INCREMENTAL_FLAG="--incremental"
          fi
          python scripts/reallog_collector.py $INCREMENTAL_FLAG
          mkdir -p cache/reallog/analysis-data-cache cache/reallog/analysis-folders-cache
          cp -r public/analysis-data/. cache/reallog/analysis-data-cache/ 2>/dev/null || true
          cp -r public/analysis-folders/. cache/reallog/analysis-folders-cache/ 2>/dev/null || true
          cp public/analysis-index.json cache/reallog/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: reallog-data
          path: |
            public/analysis-index.json
            public/analysis-folders/
            public/analysis-data/

  deploy:
    runs-on: ubuntu-latest
    needs: [collect-build-data, collect-match-data, collect-goal-scenes, collect-reallog-data]
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download crane-data
        uses: actions/download-artifact@v8
        with:
          name: crane-data
          path: public/

      - name: Download match-data
        uses: actions/download-artifact@v8
        with:
          name: match-data
          path: public/

      - name: Download goal-data
        uses: actions/download-artifact@v8
        with:
          name: goal-data
          path: public/

      - name: Download reallog-data
        uses: actions/download-artifact@v8
        with:
          name: reallog-data
          path: public/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public/

      - name: Publish
        uses: actions/deploy-pages@v5
